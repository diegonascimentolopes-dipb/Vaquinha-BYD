<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vaquinha BYD - Diego & Natan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .progress-fill { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .car-move { transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; z-index: 50; }
        .loading-screen { position: fixed; inset: 0; background: #0f172a; z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; }
        #header-bg { background-size: cover; background-position: center; transition: background-image 0.8s ease-in-out; }
        .smoothing-active { animation: border-glow 2s infinite alternate; }
        @keyframes border-glow { from { border-color: #e2e8f0; } to { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 min-h-screen pb-12">

    <!-- Ecrã de Login / Carregamento -->
    <div id="auth-screen" class="loading-screen">
        <div id="loader" class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500 mb-4"></div>
            <p class="text-[10px] font-black uppercase tracking-[0.3em]">A ligar à BYD Cloud...</p>
        </div>
        <div id="login-form" class="hidden w-full max-w-xs p-8 bg-white rounded-[2.5rem] text-slate-900 shadow-2xl mx-5">
            <h2 class="font-black text-2xl mb-6 text-center tracking-tighter italic uppercase">Vaquinha BYD</h2>
            <div class="space-y-3">
                <input type="email" id="email" placeholder="E-mail" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold transition-all">
                <input type="password" id="password" placeholder="Senha" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold transition-all">
                <button onclick="handleLogin()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-all shadow-lg shadow-slate-200">Entrar</button>
            </div>
        </div>
    </div>

    <!-- HEADER COM IMAGEM -->
    <div id="header-bg" class="bg-slate-900 pt-16 pb-24 px-6 relative overflow-hidden">
        <div class="absolute inset-0 bg-black/60"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-[#F8FAFC] via-transparent to-transparent"></div>
        
        <div class="relative z-10 max-w-xl mx-auto text-white">
            <div class="flex justify-between items-start mb-2">
                <span class="bg-blue-600 text-[9px] font-black px-2 py-0.5 rounded tracking-widest uppercase">BYD AUTO</span>
                <label class="cursor-pointer opacity-40 hover:opacity-100 transition-opacity p-2 bg-black/40 rounded-full border border-white/10">
                    <i data-lucide="camera" class="w-4 h-4 text-white"></i>
                    <input type="file" id="bg-upload" class="hidden" accept="image/*">
                </label>
            </div>
            <h1 class="text-4xl font-black tracking-tighter uppercase italic leading-none">Dolphin Mini <span class="text-blue-500 block text-2xl not-italic font-bold">Black Edition</span></h1>
            <p class="text-slate-100 text-[10px] font-black uppercase tracking-[0.3em] mt-3 flex items-center gap-2">
                <i data-lucide="users" class="w-3 h-3 text-white"></i> Diego & Natan
            </p>
        </div>
    </div>

    <main class="max-w-xl mx-auto px-5 -mt-12 relative z-20 space-y-6">
        
        <!-- STATUS E PROGRESSO -->
        <div id="stats-card" class="bg-white rounded-[2.5rem] shadow-2xl p-6 border border-white">
            <div class="grid grid-cols-2 gap-4 mb-10">
                <div>
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Total na Vaquinha</p>
                    <p id="display-total" class="text-3xl font-black text-blue-700">R$ 0,00</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Evolução</p>
                    <p id="display-percent" class="text-3xl font-black text-slate-800">0%</p>
                </div>
            </div>
            
            <div class="relative h-12 flex items-center px-1">
                <div class="w-full h-3 bg-slate-100 rounded-full overflow-hidden p-0.5 shadow-inner relative z-10">
                    <div id="progress-fill" class="progress-fill h-full bg-blue-600 rounded-full shadow-lg shadow-blue-200" style="width: 0%"></div>
                </div>
                
                <div id="car-icon" class="car-move absolute top-[-5px] transform -translate-x-1/2 flex flex-col items-center" style="left: 0%">
                    <div class="bg-slate-900 p-1.5 rounded-lg shadow-xl border border-slate-700">
                        <i data-lucide="car" class="w-4 h-4 text-white"></i>
                    </div>
                </div>
            </div>
            <div class="flex justify-between mt-3 px-1">
                <span class="text-[9px] font-bold text-slate-300 uppercase italic">Abril 2026</span>
                <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">Alvo R$ 15.000</span>
            </div>
        </div>

        <!-- DEPÓSITOS EXTRAS -->
        <div class="bg-white rounded-[2.5rem] shadow-lg p-6 border border-white">
            <h3 class="font-bold text-xs uppercase tracking-widest mb-4 flex items-center gap-2">
                <i data-lucide="zap" class="text-amber-500 w-4 h-4"></i> Adicionar Extra (Alívio)
            </h3>
            <div class="flex gap-2">
                <div class="relative flex-grow">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-slate-400">R$</span>
                    <input type="number" id="extra-input" placeholder="Valor" class="w-full pl-10 pr-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 font-bold transition-all">
                </div>
                <button onclick="addExtra()" class="bg-slate-900 text-white px-6 rounded-2xl font-bold active:scale-95 transition-all">OK</button>
            </div>
        </div>

        <!-- CRONOGRAMA -->
        <div class="bg-white rounded-[2.5rem] shadow-lg p-6 border border-white">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-xs uppercase tracking-widest flex items-center gap-2">
                    <i data-lucide="calendar" class="text-blue-600 w-4 h-4"></i> Cronograma Mensal
                </h3>
                <span id="abatimento-info" class="text-[9px] font-black text-emerald-600 bg-emerald-50 px-2 py-1 rounded"></span>
            </div>
            <div id="months-grid" class="grid grid-cols-2 gap-3"></div>
        </div>

        <!-- HISTÓRICO -->
        <div id="history-section" class="hidden bg-white rounded-[2.5rem] shadow-lg p-6 border border-white">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Registro de Extras</h3>
            <div id="extra-history" class="space-y-3"></div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBemTLWmLhBgx-8Rvm_COkQei1QGUAQdXE",
            authDomain: "vaquinha-byd.firebaseapp.com",
            projectId: "vaquinha-byd",
            storageBucket: "vaquinha-byd.firebasestorage.app",
            messagingSenderId: "525906869966",
            appId: "1:525906869966:web:04d1514a251d7a7f2d9a9f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "vaquinha-byd-shared";
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'shared', 'vaquinha');

        const timeline = [];
        const monthNames = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        let m = 3, y = 2026;
        for (let i = 0; i < 26; i++) {
            let curM = (m + i) % 12, curY = y + Math.floor((m + i) / 12);
            let val = (i < 4) ? 100 : (i < 10) ? 185 : (i < 19) ? 275 : 425;
            let bonus = (curM === 11) ? 500 : 0;
            timeline.push({ id: `m-${i}`, label: `${monthNames[curM]}/${String(curY).slice(2)}`, base: val + bonus });
        }

        let cloudData = { paidMonths: [], extraDeposits: [], headerBg: null };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loader').classList.remove('hidden');
                document.getElementById('login-form').classList.add('hidden');
                onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        cloudData = snap.data();
                        render();
                    } else {
                        setDoc(docRef, { paidMonths: [], extraDeposits: [], headerBg: null });
                    }
                    document.getElementById('auth-screen').style.display = 'none';
                });
            } else {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('login-form').classList.remove('hidden');
            }
        });

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (e) { alert("Acesso negado. Verifique os seus dados."); }
        };

        window.toggleMonth = async (id, currentVal) => {
            const exists = cloudData.paidMonths.find(p => p.id === id);
            if (exists) {
                await updateDoc(docRef, { paidMonths: arrayRemove(exists) });
            } else {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.8 }, colors: ['#2563eb', '#000000'] });
                await updateDoc(docRef, { paidMonths: arrayUnion({ id, paidEach: Math.round(currentVal) }) });
            }
        };

        window.addExtra = async () => {
            const input = document.getElementById('extra-input');
            const amount = parseFloat(input.value);
            if (amount > 0) {
                await updateDoc(docRef, { extraDeposits: arrayUnion({ amount, date: new Date().toLocaleDateString('pt-pt'), ts: Date.now() }) });
                input.value = '';
                confetti({ particleCount: 100, spread: 60, colors: ['#fbbf24'] });
            }
        };

        window.removeExtra = async (ts) => {
            const target = cloudData.extraDeposits.find(d => d.ts === ts);
            await updateDoc(docRef, { extraDeposits: arrayRemove(target) });
        };

        document.getElementById('bg-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => { await updateDoc(docRef, { headerBg: ev.target.result }); };
                reader.readAsDataURL(file);
            }
        });

        function render() {
            lucide.createIcons();
            const header = document.getElementById('header-bg');
            if (cloudData.headerBg) {
                header.style.backgroundImage = `linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(248, 250, 252, 1)), url(${cloudData.headerBg})`;
            } else {
                header.style.backgroundImage = `linear-gradient(to bottom, rgba(0,0,0,0.5), rgba(248, 250, 252, 1)), url('https://images.unsplash.com/photo-1710349405629-915019864273?q=80&w=2000')`;
            }

            const totalExtras = cloudData.extraDeposits.reduce((acc, curr) => acc + curr.amount, 0);
            let poolPerPerson = totalExtras / 2;
            let currentValues = timeline.map(m => m.base);
            let pool = poolPerPerson;

            // Nivelamento Water Level (Apenas meses não pagos)
            while (pool > 0.1) {
                let maxVal = 0, targets = [];
                timeline.forEach((m, idx) => {
                    if (!cloudData.paidMonths.find(p => p.id === m.id)) {
                        if (currentValues[idx] > maxVal + 0.1) { maxVal = currentValues[idx]; targets = [idx]; }
                        else if (Math.abs(currentValues[idx] - maxVal) < 0.1) { targets.push(idx); }
                    }
                });
                if (targets.length === 0 || maxVal <= 100) break;
                let nextMax = 100;
                timeline.forEach((m, idx) => {
                    if (!cloudData.paidMonths.find(p => p.id === m.id) && !targets.includes(idx) && currentValues[idx] > nextMax) nextMax = currentValues[idx];
                });
                let diff = Math.max(1, maxVal - nextMax);
                let totalToLevel = diff * targets.length;
                if (pool >= totalToLevel) { targets.forEach(idx => currentValues[idx] -= diff); pool -= totalToLevel; }
                else { let share = pool / targets.length; targets.forEach(idx => currentValues[idx] -= share); pool = 0; }
            }

            const grid = document.getElementById('months-grid');
            grid.innerHTML = timeline.map((m, idx) => {
                const paidData = cloudData.paidMonths.find(p => p.id === m.id);
                const displayVal = paidData ? paidData.paidEach : currentValues[idx];
                const isSmoothed = !paidData && displayVal < m.base - 0.1;

                return `
                    <button onclick="toggleMonth('${m.id}', ${displayVal})" 
                        class="p-4 rounded-3xl border-2 transition-all flex flex-col items-center justify-center relative
                        ${paidData ? 'border-blue-600 bg-blue-50 shadow-inner' : isSmoothed ? 'smoothing-active border-blue-200 bg-blue-50/20' : 'border-slate-100 bg-white'}">
                        <span class="text-[9px] font-black uppercase mb-1 ${paidData ? 'text-blue-600' : 'text-slate-400'}">${m.label}</span>
                        <div class="text-center">
                            ${isSmoothed ? `<span class="text-[8px] text-slate-300 line-through tracking-tighter">R$ ${m.base}</span>` : ''}
                            <p class="text-xs font-black ${paidData ? 'text-blue-900' : 'text-slate-800'}">R$ ${Math.round(displayVal)}/cada</p>
                            <p class="text-[8px] font-bold text-slate-400 tracking-tighter">(Par: R$ ${Math.round(displayVal * 2)})</p>
                        </div>
                        <div class="mt-2 text-slate-200"><i data-lucide="${paidData ? 'check-circle' : 'circle'}" class="w-4 h-4 ${paidData ? 'text-blue-600' : ''}"></i></div>
                    </button>
                `;
            }).join('');

            // CÁLCULO TOTAL: EXTRA + (SOMA DOS PAGOS REAIS)
            const totalPaidReal = cloudData.paidMonths.reduce((acc, curr) => acc + (curr.paidEach * 2), 0);
            const grandTotal = totalExtras + totalPaidReal;
            const percent = Math.min((grandTotal / 15000) * 100, 100);

            document.getElementById('display-total').innerText = `R$ ${grandTotal.toLocaleString('pt-pt', { minimumFractionDigits: 2 })}`;
            document.getElementById('display-percent').innerText = `${Math.floor(percent)}%`;
            document.getElementById('progress-fill').style.width = `${percent}%`;
            document.getElementById('car-icon').style.left = `${percent}%`;

            const hist = document.getElementById('extra-history');
            document.getElementById('history-section').classList.toggle('hidden', cloudData.extraDeposits.length === 0);
            hist.innerHTML = cloudData.extraDeposits.slice().reverse().map(d => `
                <div class="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div>
                        <p class="font-black text-blue-700 text-sm">R$ ${d.amount.toLocaleString('pt-pt')}</p>
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${d.date}</p>
                    </div>
                    <button onclick="removeExtra(${d.ts})" class="text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }
    </script>
</body>
</html>
